name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux-authoritative:
    name: Linux authoritative checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev libx11-xcb-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev libudev-dev libgl1-mesa-dev xdg-desktop-portal xdg-desktop-portal-gtk
      - name: Install Rust 1.92.0
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt,clippy
          rustup default 1.92.0
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Regenerate committed fixtures
        run: cargo run -p fixture-gen -- assets/examples
      - name: Verify fixtures are canonical
        run: git diff --exit-code -- assets/examples
      - name: Reject untracked generated fixtures
        run: test -z "$(git status --porcelain=v1 --untracked-files=all -- assets/examples)"
      - name: Test workspace
        run: cargo test --workspace
      - name: Build release workspace
        run: cargo build --workspace --release

  cross-platform-compile:
    name: Compile on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust 1.92.0
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
      - name: Compile tests
        run: cargo test --workspace --no-run
      - name: Build release workspace
        run: cargo build --workspace --release
